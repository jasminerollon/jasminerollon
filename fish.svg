<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" width="340" height="130">
  <defs>
    <style>
      .c {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13.5px;
        fill: #2a2a2a;
      }
      /* full body bob */
      .body {
        animation: bob 2.8s ease-in-out infinite;
        transform-origin: 170px 65px;
      }
      /* tail wag — offset phase */
      .tail {
        animation: wag 1.4s ease-in-out infinite;
        transform-origin: 255px 65px;
      }
      /* top fin subtle flutter */
      .fin {
        animation: fin 2.8s ease-in-out infinite;
        transform-origin: 155px 28px;
      }
      /* bubbles drift upward */
      .b1 { animation: bubble1 3.2s ease-in infinite; }
      .b2 { animation: bubble2 3.2s ease-in 1.1s infinite; }
      .b3 { animation: bubble3 3.2s ease-in 2.1s infinite; }

      @keyframes bob {
        0%,100% { transform: translateY(0px) rotate(0deg); }
        30%      { transform: translateY(-5px) rotate(0.8deg); }
        70%      { transform: translateY(4px) rotate(-0.6deg); }
      }
      @keyframes wag {
        0%,100% { transform: rotate(0deg); }
        35%      { transform: rotate(6deg); }
        65%      { transform: rotate(-5deg); }
      }
      @keyframes fin {
        0%,100% { transform: translateY(0px); }
        40%      { transform: translateY(-3px); }
        70%      { transform: translateY(2px); }
      }
      @keyframes bubble1 {
        0%   { transform: translate(0,0); opacity: 0; }
        10%  { opacity: 0.7; }
        100% { transform: translate(-6px,-38px); opacity: 0; }
      }
      @keyframes bubble2 {
        0%   { transform: translate(0,0); opacity: 0; }
        10%  { opacity: 0.5; }
        100% { transform: translate(-4px,-32px); opacity: 0; }
      }
      @keyframes bubble3 {
        0%   { transform: translate(0,0); opacity: 0; }
        10%  { opacity: 0.6; }
        100% { transform: translate(-8px,-28px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- bubbles (emit from nose area, drift left-up) -->
  <g class="b1"><text class="c" x="72" y="64">.</text></g>
  <g class="b2"><text class="c" x="66" y="60">·</text></g>
  <g class="b3"><text class="c" x="76" y="67">°</text></g>

  <!-- top fin -->
  <g class="fin">
    <text class="c" x="136" y="28">. - .</text>
    <text class="c" x="130" y="40">,     ,</text>
  </g>

  <!-- main fish body -->
  <g class="body">

    <!-- row 1: upper body arc -->
    <text class="c" x="100" y="50">· * · · · · * · _ .</text>

    <!-- row 2: full body — eye, belly, mouth -->
    <text class="c" x="83" y="64">· - °</text>
    <text class="c" x="148" y="64">· · · · · · ·</text>
    <text class="c" x="234" y="64">) - ,</text>

    <!-- row 3: lower body arc -->
    <text class="c" x="100" y="78">' · ~ ~   · ' · ' ·</text>

    <!-- bottom scatter -->
    <text class="c" x="116" y="90">, · · ~ · ,</text>

  </g>

  <!-- tail fin — separate wag -->
  <g class="tail">
    <text class="c" x="264" y="56">; ,</text>
    <text class="c" x="268" y="70">; ,</text>
  </g>

</svg>
