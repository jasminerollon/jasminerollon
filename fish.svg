<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" width="340" height="130">
  <defs>
    <style>
      .c {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13.5px;
        fill: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        .c { fill: #d4d0c8; }
      }

      .body {
        animation: bob 2.8s ease-in-out infinite;
        transform-origin: 170px 65px;
      }
      .tail {
        animation: wag 1.4s ease-in-out infinite;
        transform-origin: 258px 65px;
      }
      .fin {
        animation: fin 2.8s ease-in-out infinite;
        transform-origin: 155px 28px;
      }
      .b1 { animation: bubble1 3.4s ease-in infinite; }
      .b2 { animation: bubble2 3.4s ease-in 1.2s infinite; }
      .b3 { animation: bubble3 3.4s ease-in 2.3s infinite; }

      @keyframes bob {
        0%,100% { transform: translateY(0px) rotate(0deg); }
        30%      { transform: translateY(-5px) rotate(0.8deg); }
        70%      { transform: translateY(4px) rotate(-0.6deg); }
      }
      @keyframes wag {
        0%,100% { transform: rotate(0deg); }
        35%      { transform: rotate(7deg); }
        65%      { transform: rotate(-6deg); }
      }
      @keyframes fin {
        0%,100% { transform: translateY(0px); }
        40%      { transform: translateY(-3px); }
        70%      { transform: translateY(2px); }
      }
      @keyframes bubble1 {
        0%   { transform: translate(0,0);         opacity: 0; }
        8%   { opacity: 0.8; }
        100% { transform: translate(-7px,-40px);  opacity: 0; }
      }
      @keyframes bubble2 {
        0%   { transform: translate(0,0);         opacity: 0; }
        8%   { opacity: 0.6; }
        100% { transform: translate(-4px,-34px);  opacity: 0; }
      }
      @keyframes bubble3 {
        0%   { transform: translate(0,0);         opacity: 0; }
        8%   { opacity: 0.7; }
        100% { transform: translate(-9px,-30px);  opacity: 0; }
      }
    </style>
  </defs>

  <g class="b1"><text class="c" x="72" y="64">.</text></g>
  <g class="b2"><text class="c" x="65" y="60">·</text></g>
  <g class="b3"><text class="c" x="78" y="67">°</text></g>

  <g class="fin">
    <text class="c" x="136" y="26">. - .</text>
    <text class="c" x="130" y="40">,     ,</text>
  </g>

  <g class="body">
    <text class="c" x="100" y="50">· * · · · · * · _ .</text>
    <text class="c" x="83"  y="64">· - °</text>
    <text class="c" x="148" y="64">· · · · · · ·</text>
    <text class="c" x="234" y="64">) - </text>
    <text class="c" x="100" y="78">' · ~ ~   · ' · ' ·</text>
    <text class="c" x="116" y="90">, · · ~ · ,</text>
  </g>

  <g class="tail">
    <text class="c" x="275" y="56">/</text>
    <text class="c" x="264" y="56">/</text>
    <text class="c" x="264" y="70">\</text>
    <text class="c" x="275" y="70">\</text>
  </g>

</svg>
